<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D1MT1M Vault - Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-overlay">
        <div class="auth-box">
            <h2>D1MT1M <span class="accent">Vault</span></h2>
            <p id="authSubtitle">Добро пожаловать в ваш музыкальный плеер</p>
            <input type="text" id="usernameInput" placeholder="Имя пользователя">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="loginBtn">Вход</button>
                <button id="registerBtn" class="secondary-btn">Регистрация</button>
            </div>
            <p id="authMessage" class="error-msg"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="main-app hidden">
        <!-- HEADER -->
        <header class="app-header">
            <div class="header-left">
                <h1>D1MT1M <span class="accent">Vault</span></h1>
            </div>
            <div class="header-right">
                <span id="welcomeUser" class="welcome-text"></span>
                <label class="upload-btn">
                    <span class="upload-icon">⏫</span> Загрузить
                    <input type="file" id="fileInput" accept="audio/mp3" hidden>
                </label>
                <button id="logoutBtn" class="logout-btn">Выход</button>
            </div>
        </header>

        <!-- MAIN CONTAINER -->
        <div class="player-wrapper">
            <!-- LEFT SIDEBAR - PLAYLIST -->
            <aside class="playlist-sidebar">
                <div class="playlist-header">
                    <h3>🎵 Ваша библиотека</h3>
                </div>
                <div id="trackList" class="track-list">
                    <div class="empty-state">Загружаем вашу библиотеку...</div>
                </div>
            </aside>

            <!-- CENTER - PLAYER -->
            <main class="player-center">
                <!-- NOW PLAYING CARD -->
                <div class="now-playing-card">
                    <div class="album-art">
                        <div class="album-placeholder">🎵</div>
                    </div>
                    <div class="track-info">
                        <h2 id="currentTrackName" class="track-title">Выберите трек для воспроизведения</h2>
                        <p class="track-artist">D1MT1M Vault</p>
                    </div>
                </div>

                <!-- PROGRESS BAR -->
                <div class="progress-section">
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                            <div class="progress-knob"></div>
                        </div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime" class="time">0:00</span>
                        <span id="totalTime" class="time">0:00</span>
                    </div>
                </div>

                <!-- CONTROLS -->
                <div class="controls-section">
                    <div class="controls-main">
                        <button id="prevBtn" class="control-btn btn-prev" title="Предыдущий трек">
                            <span>⏮️</span>
                        </button>
                        <button id="playBtn" class="control-btn btn-play-pause" title="Воспроизведение">
                            <span>▶</span>
                        </button>
                        <button id="nextBtn" class="control-btn btn-next" title="Следующий трек">
                            <span>⏭️</span>
                        </button>
                    </div>
                    <button id="repeatBtn" class="control-btn btn-repeat" title="Повтор">
                        <span>🔁</span>
                    </button>
                </div>

                <!-- VOLUME CONTROL -->
                <div class="volume-section">
                    <span class="volume-icon">🔊</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
                    <span class="volume-label">100%</span>
                </div>
            </main>
        </div>

        <!-- AUDIO ELEMENT -->
        <audio id="audioPlayer"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
